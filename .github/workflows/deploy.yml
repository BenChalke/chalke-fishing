name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_hmac_secret: ${{ secrets.HMAC_SECRET }}
        run: terraform apply -auto-approve

      - name: Export API URL
        id: api_url
        working-directory: infra
        run: echo "api_url=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          REACT_APP_API_URL:     ${{ steps.api_url.outputs.api_url }}
          REACT_APP_HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: pnpm run build

      - name: Sync to S3
        run: aws s3 sync build/ s3://fishing.benchalke.com --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1MJW8R17S45GN --paths "/*"
